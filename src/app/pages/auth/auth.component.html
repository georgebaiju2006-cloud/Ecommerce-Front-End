<div class="auth-container">
    <!-- Left Side - Brand/Marketing Section -->
    <div class="brand-section">
        <div class="brand-content">
            <h1 class="brand-name">E·COM</h1>
            <h2 class="brand-tagline">Your style,<br>your story.</h2>
            <p class="brand-description">
                Discover curated collections crafted for those who value quality over quantity.
            </p>
            <div class="brand-footer">
                <p>Est. 2026</p>
                <p>Free shipping above ₹999</p>
            </div>
        </div>
    </div>

    <!-- Right Side - Auth Forms -->
    <div class="auth-section">
        <div class="form-container">
            <!-- Toggle Buttons -->
            <div class="toggle-buttons">
                <button [class.active]="activeTab === 'login'" (click)="switchTab('login')" class="toggle-btn">
            SIGN IN
          </button>
                <button [class.active]="activeTab === 'signup'" (click)="switchTab('signup')" class="toggle-btn">
            CREATE ACCOUNT
          </button>
            </div>

            <!-- Sign In Form -->
            <div class="form-panel" [class.active]="activeTab === 'login'">
                <h3>Welcome back.</h3>
                <p class="form-subtitle">Sign in to continue shopping.</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" [(ngModel)]="loginData.name" placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" [(ngModel)]="loginData.email" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input [type]="showLoginPassword ? 'text' : 'password'" [(ngModel)]="loginData.password" placeholder="Min. 8 characters">
                        <button type="button" class="show-btn" (click)="showLoginPassword = !showLoginPassword">
                {{ showLoginPassword ? 'Hide' : 'Show' }}
              </button>
                    </div>
                </div>

                <button class="submit-btn" (click)="handleLogin()">Sign In</button>
            </div>

            <!-- Sign Up Form -->
            <div class="form-panel" [class.active]="activeTab === 'signup'">
                <h3>Join us.</h3>
                <p class="form-subtitle">Create your account in seconds.</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" [(ngModel)]="signupData.name" placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" [(ngModel)]="signupData.email" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input [type]="showSignupPassword ? 'text' : 'password'" [(ngModel)]="signupData.password" placeholder="Min. 8 characters">
                        <button type="button" class="show-btn" (click)="showSignupPassword = !showSignupPassword">
                {{ showSignupPassword ? 'Hide' : 'Show' }}
              </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="text" [(ngModel)]="signupData.DOB" placeholder="mm/dd/yyyy">
                </div>

                <div class="form-group">
                    <label>City / Town</label>
                    <input type="text" [(ngModel)]="signupData.main_address" placeholder="Mumbai">
                </div>

                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" [(ngModel)]="signupData.secondary_address" placeholder="Street, area, pin code">
                </div>

                <button class="submit-btn" (click)="handleSignup()">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>
</div>
